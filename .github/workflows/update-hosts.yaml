name: "Update hosts blocklist"


on:
  push:
    branches: ["*"]
  schedule:
    - cron: "0 0 * * *"


jobs:

  main:
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@v4"
      - name: "Update hosts blocklist"
        run: |
          echo -e 'Automatic hosts blocklist update\n' >> commit.txt
          echo 'Sources:' >> commit.txt
          for url in $(curl --silent --show-error 'https://v.firebog.net/hosts/lists.php?type=tick'); do
            echo "  - '${url}'" >> commit.txt
            curl --silent --show-error "${url}" \
              | sed 's/#.*//g' \
              | sed 's/\s*$//g' \
              | sed 's/^.*\s//g' \
              | sed 's/[^a-zA-Z0-9.\-]//g' \
              | sed '/^\s*$/d' \
              | sed '/^localhost$/d' \
              >> hosts.blocklist
          done
          sort hosts.blocklist | uniq | grep --invert-match --line-regexp --file hosts.allowlist | sed 's/^/0.0.0.0 /g' > hosts

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add hosts
          git commit --allow-empty --file commit.txt
          git push
